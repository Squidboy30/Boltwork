worker_processes 1;
error_log /tmp/nginx-error.log warn;
pid /tmp/nginx.pid;
events { worker_connections 1024; }
http {
    client_body_temp_path /tmp/client;
    proxy_temp_path /tmp/proxy;
    server {
        listen 8079;

        # Health check — handled by nginx directly, no upstream needed
        location = /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Static well-known files served from disk
        location /.well-known/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
        }

        # Free info endpoints — bypass Aperture, go direct to FastAPI
        # Aperture price:0 still issues a macaroon challenge; nginx bypass avoids it
        location = /trial/info {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.0;
            proxy_set_header Connection "close";
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
        }
        location = /memory/info {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.0;
            proxy_set_header Connection "close";
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
        }
        location = /workflow/info {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.0;
            proxy_set_header Connection "close";
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
        }

        # Everything else goes through Aperture (L402 payment layer)
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.0;
            proxy_set_header Connection "close";
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }
    }
}
