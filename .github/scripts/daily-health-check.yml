name: Parsebit Daily Health Check

on:
  schedule:
    # 8:00am UK time (UTC+1 BST / UTC+0 GMT)
    # Run at 7:00 UTC which covers both BST and GMT
    - cron: '0 7 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run health checks and send report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python .github/scripts/check_health.py
        # Note: exits with code 1 if any check fails, but we always send the email
        continue-on-error: true

      - name: Mark workflow as failed if checks failed
        if: failure()
        run: |
          echo "One or more health checks failed — see email for details"
          exit 1
