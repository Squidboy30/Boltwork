name: Parsebit Daily Health Check
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run health checks and send report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: python .github/scripts/check_health.py
        continue-on-error: true
